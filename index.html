<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preventivo Taxi Lecce</title>

<style>

body {
font-family: Arial, sans-serif;
background:#f2f2f2;
}

.box {
background:white;
max-width:420px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px #ccc;
}

h1 {
text-align:center;
}

label {
display:block;
margin-top:15px;
font-weight:bold;
}

input {
width:100%;
padding:12px;
margin-top:5px;
box-sizing:border-box;
border-radius:8px;
border:1px solid #ccc;
}

button {
width:100%;
margin-top:20px;
padding:15px;
background:#f58220;
color:white;
border:0;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#risultato {
margin-top:25px;
text-align:center;
font-size:20px;
font-weight:bold;
}

</style>

</head>


<body>


<div class="box">

<h1>🚕 Preventivo Taxi</h1>


<label>Partenza</label>
<input id="partenza" placeholder="Es. Lecce, Piazza Sant'Oronzo">


<label>Destinazione</label>
<input id="destinazione" placeholder="Es. Aeroporto Brindisi">


<label>Ora servizio</label>
<input id="ora" type="time">


<label>Numero bagagli</label>
<input id="bagagli" type="number" value="0">


<label>
<input id="festivo" type="checkbox">
 Servizio festivo (+3€)
</label>


<button onclick="calcola()">
Calcola preventivo
</button>


<div id="risultato"></div>


</div>



<script>


async function geocode(indirizzo){


let risposta = await fetch(
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(indirizzo)
);


let dati = await risposta.json();


if(dati.length === 0){
throw "Indirizzo non trovato";
}


return {

lat:dati[0].lat,
lon:dati[0].lon

};


}



async function calcola(){


let risultato = document.getElementById("risultato");

risultato.innerHTML="⏳ Calcolo in corso...";


try{


let partenza =
await geocode(document.getElementById("partenza").value);


let destinazione =
await geocode(document.getElementById("destinazione").value);



let url =

"https://router.project-osrm.org/route/v1/driving/"
+
partenza.lon+","+partenza.lat+
";"+
destinazione.lon+","+destinazione.lat+
"?overview=false";



let risposta = await fetch(url);

let percorso = await risposta.json();



let km =
percorso.routes[0].distance / 1000;



let prezzo =
5 + (km * 1.65);



// notte

let ora =
document.getElementById("ora").value;


if(ora){

let oraNumero =
Number(ora.split(":")[0]);


if(oraNumero >=21 && oraNumero <24){
prezzo += 3;
}


if(oraNumero >=0 && oraNumero <6){
prezzo += 5;
}

}



// bagagli

let bagagli =
Number(document.getElementById("bagagli").value);


prezzo += bagagli;



// festivo

if(document.getElementById("festivo").checked){
prezzo += 3;
}



// minimo

if(prezzo < 10){
prezzo = 10;
}



risultato.innerHTML =
"🚗 Distanza: "+km.toFixed(1)+" km<br><br>"+
"💶 Preventivo stimato: "+prezzo.toFixed(2)+" €";



}

catch(e){

risultato.innerHTML =
"❌ Errore nel calcolo. Controlla gli indirizzi.";

console.log(e);

}


}


</script>


</body>
</html>
